<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard by Javier Asuncion</title>
    <link rel="stylesheet" href="/CSS/reset.css">
    <link rel="stylesheet" href="/CSS/style.css">

</head>
<body>
    <main>
        <section class="pass-container">
            <div class="title"><h2>Crea tu contraseña segura</h2></div>
            <div class="form">
                <div class="passwordForm" id="passwordForm">
                    <label for="length">Numero de caracteres de la contraseña</label>
                    <input type="number" id="length" name="length" min="12" max="50" value="">
                    <br>
                    <button name="button" type="button" id="gen">Generar</button>
                    <div class="passResult" id="passResult"></div>
                </div>
            </div>
        </section>
        <section>
            <div class="list-container">
                <div class="title"><h2>Añade tu enlace de interes</h2></div>
                <div class="form">
                    <input type="text" id="link-name" name="Nombre del Enlace" required placeholder="nombre del enlace" value="">
                    <br>
                    <input type="text" id="add-url" name="url" required placeholder="Pega aqui tu url" value="">
                    <br>
                    <button name="button" type="button" id="add-link"> Añadir Enlace</button>
                    <ul class="url-list" id="url-list"></ul>
                </div>
            </div>
        </section>
        <section>
            <div class="clock-container">
                
                <div class="form" id="digital-clock"></div>
                <div class="form" id="digital-date"></div>
                <div class="form" id="digital-frase"></div>
            </div>
        </section>
        <section>
            <div class="clima-container" id="clima-container">
                <h2 id="ciudad-pais"></h2>
                <p id="temperatura">temperatura: </p>
                <img id="icon-clima" src="" alt="">
                <hr>
                <h3>Tiempo por horas</h3>
                <hr>
                <div id="time-horas"></div>
                <p id="descript"></p>
            </div>
        </section>
    </main>
    
</body>
<script type="module" src="./JS/main.js"></script>
</html>
